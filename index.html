<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tool Custody" />
<meta name="theme-color" content="#14181c" />
<title>Tool Custody</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');

:root{
  --bg: #14181c;
  --panel: #1b2127;
  --panel-raised: #222a32;
  --border: #313b45;
  --border-soft: #262f38;
  --text: #ece9e2;
  --text-dim: #93a0ac;
  --text-faint: #5f6b76;
  --accent: #f2b705;
  --accent-ink: #201800;
  --accent2: #4fa3b8;
  --danger: #e2604f;
  --danger-bg: #3a2420;
  --success: #57b587;
  --radius: 14px;
  --radius-sm: 9px;
  --font-display: 'Oswald', 'Arial Narrow', sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

*{ box-sizing: border-box; }
html, body{
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-tap-highlight-color: transparent;
}
body{
  min-height: 100vh;
}
#page{
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(242,183,5,0.05), transparent 60%),
    var(--bg);
  position: relative;
  display: flex;
  flex-direction: column;
}
#app{
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 18px 18px 32px;
  overflow-y: auto;
}
button{ font-family: inherit; cursor: pointer; }
input, textarea, select{ font-family: inherit; }
::selection{ background: var(--accent); color: var(--accent-ink); }

.icon{ display: inline-block; vertical-align: -3px; flex-shrink: 0; }
.icon.flip{ transform: scaleX(-1); }

.dim{ color: var(--text-dim); font-size: 14px; margin: 4px 0 0; }
.dim-sm{ color: var(--text-faint); font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
.strike{ text-decoration: line-through; color: var(--text-faint); }

.screen{ display: flex; flex-direction: column; gap: 14px; animation: fadeIn .22s ease; }
@keyframes fadeIn{ from{ opacity: 0; transform: translateY(6px);} to{ opacity: 1; transform: translateY(0);} }

.center-fill{ flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; padding: 40px 10px; }

.spinner{
  width: 34px; height: 34px; border-radius: 50%;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}
@keyframes spin{ to{ transform: rotate(360deg); } }

.alert-card{ color: var(--danger); display: flex; flex-direction: column; align-items: center; gap: 10px; }

.diag-box{
  margin-top: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: left;
  color: var(--text);
  max-width: 100%;
}
.diag-url{
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent2);
  background: var(--panel-raised);
  border-radius: 6px;
  padding: 8px 10px;
  margin: 6px 0;
  word-break: break-all;
  user-select: all;
}
.diag-box code{ font-family: var(--font-mono); font-size: 0.95em; }

/* ---------- Buttons ---------- */
.cta-btn{
  background: var(--accent);
  color: var(--accent-ink);
  border: none;
  border-radius: var(--radius);
  padding: 17px 18px;
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  width: 100%;
  transition: transform .12s ease, filter .12s ease;
}
.cta-btn:active{ transform: scale(0.98); }
.cta-btn:disabled{ opacity: 0.35; filter: grayscale(0.4); cursor: not-allowed; }

.secondary-btn{
  background: var(--panel-raised);
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 14px;
  font-weight: 600;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.secondary-btn:active{ transform: scale(0.98); }
.secondary-btn.full{ width: 100%; }

.row-2{ display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.back-btn{
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
  align-self: flex-start;
}

.icon-btn{
  background: var(--panel-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
}

.admin-link{
  margin-top: auto;
  align-self: center;
  background: none;
  border: none;
  color: var(--text-faint);
  font-size: 13px;
  display: flex; align-items: center; gap: 6px;
  padding: 10px;
}

.setup-screen{ padding-top: 6vh; }
.setup-card{
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  display: flex; flex-direction: column; gap: 10px;
}
.setup-list{ margin: 4px 0; padding-left: 20px; display: flex; flex-direction: column; gap: 10px; font-size: 13.5px; line-height: 1.5; }
.setup-list li{ padding-left: 4px; }
.setup-list strong{ color: var(--accent); font-family: var(--font-mono); font-weight: 600; font-size: 0.95em; }

/* ---------- Login ---------- */
.login-screen{ align-items: stretch; min-height: calc(100vh - 50px); justify-content: flex-start; padding-top: 6vh; }
.brand{ text-align: center; margin-bottom: 10px; }
.brand-mark{
  width: 52px; height: 52px; margin: 0 auto 14px;
  border-radius: 12px;
  background: var(--accent);
  color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center;
}
.brand h1{
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 24px;
  margin: 0;
}
.brand-sub{ color: var(--text-dim); font-size: 14px; margin-top: 6px; }

.tech-grid{ display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
.tech-tile{
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  color: var(--text);
}
.tech-tile:active{ border-color: var(--accent); transform: scale(0.98); }
.tech-avatar{
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--panel-raised);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--accent);
}
.tech-name{ font-weight: 600; font-size: 14px; text-align: center; }

/* ---------- PIN ---------- */
.pin-screen{ align-items: center; text-align: center; }
.pin-header{ display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; padding-top: 4px; }
.pin-eyebrow{ text-transform: uppercase; letter-spacing: 0.14em; font-size: 11px; color: var(--text-faint); margin: 0; }
.pin-header h2{ font-family: var(--font-display); text-transform: uppercase; margin: 0; font-size: 20px; }
.pin-dots{ display: flex; gap: 12px; margin: 10px 0; }
.pin-dot{ width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border); }
.pin-dot.filled{ background: var(--accent); border-color: var(--accent); }
.pin-error{ color: var(--danger); font-size: 13px; display: flex; align-items: center; gap: 5px; margin: 0; }
.pin-pad{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 300px; margin: 8px auto 0; }
.pin-key{
  background: var(--panel);
  border: 1.5px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 600;
  padding: 18px 0;
  display: flex; align-items: center; justify-content: center;
}
.pin-key:active{ background: var(--panel-raised); border-color: var(--accent); }
.pin-key-empty{ background: transparent; border: none; }
.pin-key-fn{ color: var(--text-dim); }

/* ---------- Top bar / stats ---------- */
.topbar{ display: flex; align-items: center; justify-content: space-between; }
.topbar-eyebrow{ text-transform: uppercase; letter-spacing: 0.12em; font-size: 11px; color: var(--text-faint); margin: 0 0 2px; display: flex; align-items: center; gap: 5px; }
.topbar h2{ font-family: var(--font-display); text-transform: uppercase; margin: 0; font-size: 20px; }

.stat-row{ display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card{
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-num{ font-family: var(--font-display); font-size: 28px; color: var(--accent); }
.stat-label{ font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }

.section-head{ display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
.section-head h3{ font-family: var(--font-display); text-transform: uppercase; font-size: 14px; letter-spacing: 0.04em; margin: 0; color: var(--text-dim); }

.screen-title{ font-family: var(--font-display); text-transform: uppercase; font-size: 20px; margin: 0; }

.topbar-actions{ display: flex; gap: 8px; }

.export-banner{
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  background: var(--panel);
  border: 1.5px dashed var(--accent2);
  color: var(--accent2);
  border-radius: var(--radius-sm);
  padding: 11px 12px;
  font-size: 13px;
  font-weight: 600;
}
.export-banner:active{ background: var(--panel-raised); }

.danger-link{
  background: none; border: none;
  color: var(--text-faint);
  font-size: 12px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 10px;
  margin-top: 4px;
}
.danger-link:active{ color: var(--danger); }

/* ---------- Search / chips ---------- */
.search-box{
  display: flex; align-items: center; gap: 8px;
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 12px;
}
.search-box input{
  background: none; border: none; outline: none; color: var(--text);
  font-size: 14px; width: 100%;
}
.search-icon{ color: var(--text-faint); }

.chip-row{ display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
.chip{
  flex-shrink: 0;
  background: var(--panel);
  border: 1.5px solid var(--border);
  color: var(--text-dim);
  border-radius: 999px;
  padding: 7px 14px;
  font-size: 12.5px;
  font-weight: 600;
  white-space: nowrap;
}
.chip-active{ background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

/* ---------- Tool list rows ---------- */
.tool-list{ display: flex; flex-direction: column; gap: 9px; }
.tool-row{
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px 14px;
  display: flex; flex-direction: column; gap: 6px;
  text-align: left;
  color: var(--text);
}
.tool-row:active{ border-color: var(--accent2); }
.tool-row-main{ display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.tool-row-name{ font-weight: 600; font-size: 14.5px; }
.tool-row-id{ font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
.tool-row-sub{ display: flex; align-items: center; justify-content: space-between; gap: 8px; }

.badge{
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
  padding: 3px 8px; border-radius: 999px;
}
.badge-ok{ background: rgba(87,181,135,0.15); color: var(--success); }
.badge-warn{ background: rgba(226,96,79,0.15); color: var(--danger); }
.badge-info{ background: rgba(79,163,184,0.15); color: var(--accent2); }

.empty-note{ color: var(--text-faint); font-size: 13.5px; text-align: center; padding: 18px 0; }

/* ---------- Tool tag (signature element) ---------- */
.tool-tag{
  position: relative;
  background: var(--panel);
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  padding: 18px 16px 14px;
  overflow: hidden;
}
.tag-hole{
  position: absolute;
  top: 12px; left: 14px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--bg);
  border: 1.5px dashed var(--border);
}
.tag-id{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  text-align: right;
  letter-spacing: 0.04em;
}
.tag-name{
  font-family: var(--font-display);
  text-transform: uppercase;
  font-size: 19px;
  letter-spacing: 0.02em;
  margin-top: 10px;
  padding-left: 22px;
}
.tag-cat{ color: var(--text-dim); font-size: 12.5px; padding-left: 22px; margin-top: 2px; }
.tag-meta{ display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-soft); flex-wrap: wrap; }

.recorded-box{
  display: flex; align-items: center; justify-content: space-between;
  background: var(--panel-raised);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
}
.recorded-value{ font-weight: 600; font-size: 13.5px; display: flex; align-items: center; gap: 6px; }

.prompt-q{ font-size: 15.5px; font-weight: 600; margin: 2px 0 -4px; }
.group-label{ text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; color: var(--text-faint); margin: 6px 0 -6px; }

.entity-grid{ display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.entity-chip{
  position: relative;
  background: var(--panel);
  border: 1.5px solid var(--border);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 12px 10px;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  font-weight: 600;
  text-align: left;
}
.entity-chip-sel{ border-color: var(--accent); background: rgba(242,183,5,0.08); color: var(--accent); }
.recorded-tag{
  position: absolute; top: -7px; right: 6px;
  background: var(--accent2); color: #0d1a1e;
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  padding: 2px 6px; border-radius: 999px;
}

.mismatch-banner{
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--danger-bg);
  border: 1px solid rgba(226,96,79,0.4);
  color: var(--danger);
  border-radius: var(--radius-sm);
  padding: 12px 13px;
  font-size: 13px;
  line-height: 1.4;
}

.notes-area{
  width: 100%;
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 11px 12px;
  font-size: 13.5px;
  min-height: 64px;
  resize: vertical;
  outline: none;
}
.notes-area:focus{ border-color: var(--accent2); }

/* ---------- Success ---------- */
.success-badge{
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(87,181,135,0.15);
  color: var(--success);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
}
.mismatch-note{ color: var(--danger); font-size: 12.5px; display: flex; align-items: center; gap: 5px; }

/* ---------- Activity ---------- */
.activity-list{ display: flex; flex-direction: column; gap: 9px; }
.activity-card{
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 13px;
}
.activity-top{ display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.activity-tool{ font-weight: 600; font-size: 13.5px; }
.mismatch-pill{
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--danger-bg); color: var(--danger);
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  padding: 2px 7px; border-radius: 999px;
}
.activity-line{ font-size: 13px; margin: 6px 0 3px; color: var(--text); }
.activity-notes{ font-size: 12.5px; color: var(--text-dim); font-style: italic; margin: 6px 0 0; }

/* ---------- Admin ---------- */
.admin-tabs{ display: flex; gap: 6px; overflow-x: auto; }
.admin-tab{
  flex-shrink: 0;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 999px;
  padding: 8px 13px;
  font-size: 12.5px;
  font-weight: 600;
}
.admin-tab-active{ background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.admin-content{ display: flex; flex-direction: column; gap: 9px; }

.admin-row{
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  flex-wrap: wrap;
}
.admin-row-main{ display: flex; flex-direction: column; gap: 3px; font-size: 13.5px; font-weight: 600; }
.admin-row-actions{ display: flex; gap: 6px; flex-wrap: wrap; }

.mini-btn{
  background: var(--panel-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 7px 10px;
  font-size: 12px;
  font-weight: 600;
  display: inline-flex; align-items: center; gap: 5px;
}
.mini-btn-primary{ background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.mini-btn-danger{ color: var(--danger); }

.admin-add-form{
  display: flex; flex-direction: column; gap: 8px;
  background: var(--panel-raised);
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 13px;
  margin-top: 4px;
}
.admin-add-form input, .admin-add-form select, .admin-add-form textarea{
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 9px 10px;
  font-size: 13px;
  outline: none;
}
.admin-add-form textarea{ min-height: 50px; }

.admin-edit-card{
  background: var(--panel-raised);
  border: 1.5px solid var(--accent2);
  border-radius: var(--radius-sm);
  padding: 13px;
  display: flex; flex-direction: column; gap: 8px;
}
.admin-edit-card select, .admin-edit-card input, .admin-edit-card textarea{
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 9px 10px;
  font-size: 13px;
  outline: none;
}
.pin-text-input{
  font-family: var(--font-mono);
  font-size: 20px;
  letter-spacing: 0.3em;
  text-align: center;
}

/* ---------- Toast ---------- */
.toast{
  position: fixed;
  bottom: 22px; left: 50%; transform: translateX(-50%);
  max-width: 420px; width: calc(100% - 40px);
  background: var(--panel-raised);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13.5px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50;
  animation: toastIn .2s ease;
}
.toast-err{ border-color: var(--danger); color: var(--danger); }
@keyframes toastIn{ from{ opacity:0; transform: translate(-50%, 10px);} to{ opacity:1; transform: translate(-50%,0);} }

/* ---------- Focus visibility ---------- */
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
  outline: 2px solid var(--accent2);
  outline-offset: 2px;
}

/* ---------- Scrollbar (webkit) ---------- */
#app::-webkit-scrollbar{ width: 6px; }
#app::-webkit-scrollbar-thumb{ background: var(--border); border-radius: 3px; }

@media (min-width: 481px){
  body{ background: #0d1013; }
  #page{ box-shadow: 0 0 0 1px var(--border-soft), 0 30px 80px rgba(0,0,0,0.5); margin-top: 0; }
}

</style>
</head>
<body>
<div id="page">
  <div id="app"></div>
</div>
<script>
/* =========================================================
   Tool Custody — internal tool tracking for field techs
   Vanilla JS SPA. Data persists via window.storage (shared).
   ========================================================= */

/* ---------------- Icon set (hand-authored, generic line icons) ---------------- */
var ICONS = {
  "arrow-left": '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
  "check": '<polyline points="20 6 9 17 4 12"/>',

function uid(prefix){ return prefix + "-" + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function nowIso(){ return new Date().toISOString(); }
function fmtDT(iso){
  try {
    var d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + " \u00B7 " +
           d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  } catch (e) { return iso; }
}
function esc(str){
  return String(str === undefined || str === null ? "" : str).replace(/[&<>"']/g, function(c){
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}
async function sha256Hex(text){
  var enc = new TextEncoder().encode(text);
  var buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.prototype.map.call(new Uint8Array(buf), function(b){ return b.toString(16).padStart(2, "0"); }).join("");
}

/* ---------------- Storage (Google Apps Script backend) ----------------
   This build talks to a Google Sheet through a small Apps Script Web App
   instead of Claude's window.storage, so it works for anyone with the
   link — no Claude account or plan required. See SETUP-GUIDE.md.

   Everything — reads AND writes — goes out as a <script src="..."> tag
   (JSONP), never fetch(). Google's Apps Script Web Apps don't reliably
   send back the Access-Control-Allow-Origin header a cross-origin fetch()
   needs, and POST specifically can also get silently neutralized by some
   ad blockers / privacy extensions that heuristically treat a cross-origin
   POST as a tracking beacon. A plain script-tag GET isn't subject to
   either problem, so that's the one mechanism used for all storage calls.
   ------------------------------------------------------------------- */
var BACKEND_URL = "https://script.google.com/macros/s/AKfycbwK9W8Fq57xiHU2CVHFWElPd_jvcG8BTx9QSkD3fo4Hzux7anTJG_31mr6GWAdiid9GaQ/exec";
var FETCH_TIMEOUT_MS = 12000;
var __jsonpCounter = 0;

function backendConfigured(){
  return typeof BACKEND_URL === "string" &&
    BACKEND_URL.indexOf("https://") === 0 &&
    BACKEND_URL.indexOf("PASTE_") === -1;
}

function jsonpRequest_(params){
  return new Promise(function(resolve, reject){
    var cbName = "__toolCustodyCb" + (__jsonpCounter++) + "_" + Date.now();
    var script = document.createElement("script");
    var timer = setTimeout(function(){
      cleanup();
      var err = new Error("timed out");
      err.name = "AbortError";
      reject(err);
    }, FETCH_TIMEOUT_MS);
    function cleanup(){
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(data){
      cleanup();
      resolve(data);
    };
    script.onerror = function(){
      cleanup();
      reject(new Error("could not load the database script"));
    };
    var qs = Object.keys(params).map(function(k){
      return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
    }).join("&");
    script.src = BACKEND_URL + "?" + qs + "&callback=" + cbName;
    document.head.appendChild(script);
  });
}

// Fallback transport: load the same request as a hidden iframe (a DOCUMENT
// load, not a script load). Some devices block script loads to
// script.google.com while allowing document loads — direct navigation to
// the same URL provably works on those devices — so when the script-tag
// route fails, this one gets through. The served page posts the result
// back via postMessage (see iframeOut_ in Code.gs).
function iframeRequest_(params, timeoutMs){
  return new Promise(function(resolve, reject){
    var reqId = "req" + (__jsonpCounter++) + "_" + Date.now();
    var iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.setAttribute("aria-hidden", "true");
    var timer = setTimeout(function(){
      cleanup();
      var err = new Error("timed out");
      err.name = "AbortError";
      reject(err);
    }, timeoutMs || FETCH_TIMEOUT_MS);
    function cleanup(){
      clearTimeout(timer);
      window.removeEventListener("message", onMsg);
      if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
    }
    function onMsg(ev){
      var d = ev.data;
      if (!d || typeof d !== "object" || !d.toolCustody || d.reqId !== reqId) return;
      cleanup();
      resolve(d.data);
    }
    window.addEventListener("message", onMsg);
    var qs = Object.keys(params).map(function(k){
      return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
    }).join("&");
    iframe.src = BACKEND_URL + "?" + qs + "&transport=iframe&reqId=" + reqId;
    (document.body || document.documentElement).appendChild(iframe);
  });
}

// Which transport to try first. Starts with the script tag (fastest);
// switches permanently to iframe for this session once the script route
// fails and the iframe route succeeds, so every later call skips the
// known-broken path instead of paying its failure each time.
var __transport = "jsonp";

async function storageRequest_(params){
  if (__transport === "iframe"){
    return iframeRequest_(params);
  }
  try {
    return await jsonpRequest_(params);
  } catch (jsonpErr){
    // If the script attempt errored FAST (onerror), something is actively
    // blocking script loads — the iframe route deserves a full-length try,
    // and on these devices it's expected to succeed. If the script attempt
    // TIMED OUT, connectivity itself is probably down, so give the iframe
    // only a short try to avoid stacking two full timeouts per call.
    var timedOut = jsonpErr && jsonpErr.name === "AbortError";
    try {
      var result = await iframeRequest_(params, timedOut ? 5000 : undefined);
      __transport = "iframe";
      console.warn("Database script route is blocked on this device; switched to iframe transport.");
      return result;
    } catch (iframeErr){
      throw timedOut ? jsonpErr : iframeErr;
    }
  }
}

async function storageGet(key){
  try {
    var data = await storageRequest_({ action: "get", key: key });
    if (!data || data.value === null || data.value === undefined) return null;
    return JSON.parse(data.value);
  } catch (e){
    console.error("storage get failed", key, e);
    S.lastStorageError = describeStorageError_(e);
    return null;
  }
}
async function storageSet(key, value){
  try {
    var data = await storageRequest_({ action: "set", key: key, value: JSON.stringify(value) });
    return !!data && data.ok === true;
  } catch (e){
    console.error("storage set failed", key, e);
    S.lastStorageError = describeStorageError_(e);
    return false;
  }
}
// Adds one entry to the activity log without ever re-sending the whole
// (potentially large) history — only ever a single entry travels over the
// URL, no matter how long the log has grown. Returns the updated full log
// array on success, or null on failure.
async function storageAppendLog(entry){
  try {
    var data = await storageRequest_({ action: "append", key: "activity-log", entry: JSON.stringify(entry) });
    if (!data || !data.ok) return null;
    return JSON.parse(data.value);
  } catch (e){
    console.error("storage append failed", e);
    S.lastStorageError = describeStorageError_(e);
    return null;
  }
}
function describeStorageError_(e){
  if (__lastCspViolation && (Date.now() - __lastCspViolation.time) < 5000){
    var shortUri = __lastCspViolation.blockedURI;
    try { var parsed = new URL(shortUri); shortUri = parsed.origin; } catch (ignore){}
    return "Blocked by this site's Content-Security-Policy (" + __lastCspViolation.directive + " disallows " + shortUri + ").";
  }
  if (e && e.name === "AbortError") return "The database took too long to respond (timed out after " + Math.round(FETCH_TIMEOUT_MS / 1000) + "s).";
  return "Could not reach the database (" + (e && e.message ? e.message : "network error") + ").";
}

async function bootstrap(){
  // Show *something* immediately — never leave the screen blank while we
  // wait on the network, even if the backend is slow or unreachable.
  S.loading = true;
  render();

  if (!backendConfigured()){
    S.loading = false;
    S.needsSetup = true;
    render();
    return;
  }
  try {
    var reads = await Promise.all([
      storageGet("technicians"),
      storageGet("tools"),
      storageGet("locations"),
      storageGet("activity-log"),
      storageGet("seed-version")
    ]);
    var technicians = reads[0], tools = reads[1], locations = reads[2], log = reads[3], seedVersion = reads[4];

    var freshInstall = (!technicians && !tools && !locations);

    if (freshInstall){
      locations = cloneLocations();
      technicians = await buildFreshTechnicians();
      tools = buildFreshTools(locations);
      log = log || [];
      // Written one at a time on purpose: the backend serializes concurrent
      // writes behind a shared lock (so two technicians saving at once can't
      // collide), so firing all five at once just means the last ones sit
      // queued behind the others until each one's own client-side timeout
      // expires. Stops at the first failure so a dead connection surfaces
      // an error promptly instead of grinding through all five timeouts.
      var seedOk = await storageSet("locations", locations);
      if (seedOk) seedOk = await storageSet("technicians", technicians);
      if (seedOk) seedOk = await storageSet("tools", tools);
      if (seedOk) seedOk = await storageSet("activity-log", log);
      if (seedOk) seedOk = await storageSet("seed-version", SEED_VERSION);
      if (!seedOk){
        throw new Error(S.lastStorageError || "Could not save initial data to the database.");
      }
    } else {
      // Defensively fill in anything genuinely missing.
      if (!locations){ locations = cloneLocations(); await storageSet("locations", locations); }
      if (!technicians){ technicians = await buildFreshTechnicians(); await storageSet("technicians", technicians); }
      if (!tools){ tools = buildFreshTools(locations); await storageSet("tools", tools); }
      if (!log){ log = []; await storageSet("activity-log", log); }

      // If this install's technician list is still exactly the old
      // placeholder demo roster (Arad K. / Xander N.), it's safe to upgrade
      // to the current company roster automatically — even if a few test
      // transfers were logged against those placeholder names, since that
      // was never real company data. If ANY technician outside that old
      // placeholder set exists (meaning someone already started entering
      // real people), never touch it silently — use "Reload Company
      // Roster" in the Admin panel instead.
      var OLD_PLACEHOLDER_TECH_IDS = ["aradk", "xandern"];
      var isUntouchedPlaceholderRoster = !technicians || technicians.length === 0 ||
        technicians.every(function(t){ return OLD_PLACEHOLDER_TECH_IDS.indexOf(t.id) !== -1; });
      var needsUpgrade = (!seedVersion || seedVersion < SEED_VERSION) && isUntouchedPlaceholderRoster;
      if (needsUpgrade){
        locations = cloneLocations();
        technicians = await buildFreshTechnicians();
        tools = buildFreshTools(locations);
        await storageSet("locations", locations);
        await storageSet("technicians", technicians);
        await storageSet("tools", tools);
        await storageSet("seed-version", SEED_VERSION);
      }
    }

    S.technicians = technicians;
    S.tools = tools;
    S.locations = locations;
    S.log = log;
    S.loading = false;
  } catch (e){
    console.error(e);
    S.loading = false;
    S.fatalError = (S.lastStorageError || e.message || "Could not load the tool database.") + " Check your connection and reload.";
  }
  render();
}

App.submitPin = async function(){
  if (S.pinTarget === "admin"){
    if (S.pinBuffer === ADMIN_PIN){
      S.adminAuthed = true;
      S.adminTab = "tools";
      goto("admin");
    } else {
      S.pinError = true;
      S.pinBuffer = "";
      render();
    }
    return;
  }
  var hash = await sha256Hex(S.pinBuffer);
  if (S.pinTarget && hash === S.pinTarget.pinHash){
    S.currentTech = S.pinTarget;
    S.pinTarget = null;
    S.pinBuffer = "";
    goto("home");
  } else {
    S.pinError = true;
    S.pinBuffer = "";
    render();
  }
};

App.confirmTransfer = async function(){
  if (!S.selectedTool || !S.foundAt || !S.destination || S.saving) return;
  S.saving = true;
  render();

  var tool = findTool(S.selectedTool.id);
  var previousHolder = tool.holder;
  var performedBy = S.currentTech ? S.currentTech.name : "Unknown";
  var entry = {
    id: uid("txn"),
    timestamp: nowIso(),
    toolId: tool.id,
    toolName: tool.name,
    performedBy: performedBy,
    previousHolderLabel: refLabel(previousHolder),
    foundAtLabel: refLabel(S.foundAt),
    newHolderLabel: refLabel(S.destination),
    action: "Transfer",
    mismatch: S.mismatch,
    notes: S.notes.trim()
  };

  tool.holder = S.destination;
  tool.status = statusForDestination(S.destination);
  tool.lastUpdate = entry.timestamp;
  tool.lastUpdatedBy = performedBy;
  if (S.notes.trim()) tool.notes = S.notes.trim();

  var toolsOk = await storageSet("tools", S.tools);
  var updatedLog = await storageAppendLog(entry);

  S.saving = false;
  if (!toolsOk || !updatedLog){
    showToast("Could not save the transfer. Please try again.", true);
    render();
    return;
  }
  S.log = updatedLog;
  goto("success");
};

App.exportWord = function(){
  try {
    var html = wordDocHtml();
    var blob = new Blob(["\ufeff", html], { type: "application/msword" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var stamp = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = "Tool-Custody-Report-" + stamp + ".doc";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
    showToast("Word report downloaded.");
  } catch (e){
    console.error("export failed", e);
    showToast("Could not generate the Word report.", true);
  }
};

/* ---------------- Rendering ---------------- */
function render(){
  var root = document.getElementById("app");
  if (!root) return;
  var active = document.activeElement;
  var focusId = (active && active.id) ? active.id : null;
  var selStart = null, selEnd = null;
  if (focusId && typeof active.selectionStart === "number"){
    selStart = active.selectionStart;
    selEnd = active.selectionEnd;
  }
  root.innerHTML = screenHTML();
  if (focusId){
    var el = document.getElementById(focusId);
    if (el){
      el.focus();
      if (selStart !== null && typeof el.setSelectionRange === "function"){
        try { el.setSelectionRange(selStart, selEnd); } catch (e){}
      }
    }
  }
}
function renderScreenOnly(){ render(); }

function screenHTML(){
  if (S.loading) return loadingHTML();
  if (S.needsSetup) return needsSetupHTML();
  if (S.fatalError) return errorHTML();
  if (S.toast) { /* toast rendered inside layout */ }

  var body;
  switch (S.screen){
    case "login": body = loginHTML(); break;
    case "pin": body = pinHTML(); break;
    case "home": body = homeHTML(); break;
    case "pick-tool": body = pickToolHTML(); break;
    case "found-at": body = foundAtHTML(); break;
    case "destination": body = destinationHTML(); break;
    case "success": body = successHTML(); break;
    case "my-inventory": body = myInventoryHTML(); break;
    case "activity": body = activityHTML(); break;
    case "admin": body = adminHTML(); break;
    default: body = loginHTML();
  }
  return body + toastHTML();
}

  return '<div class="center-fill"><div class="spinner"></div><p class="dim">Loading tool records\u2026</p></div>';
}
function errorHTML(){
  var isCsp = S.fatalError && S.fatalError.indexOf("Content-Security-Policy") !== -1;

  return '<div class="center-fill"><div class="alert-card">' + icon("alert", 28) + '<p>' + esc(S.fatalError) + '</p>' +
    (isCsp ?
      '<div class="diag-box">' +
        '<p class="group-label">What this means</p>' +
        '<p class="dim-sm">The site hosting this page is sending a security policy that blocks loading anything from script.google.com. This isn\u2019t a network or database problem \u2014 it won\u2019t fix itself by retrying. If you\u2019re hosting on GitHub Pages, check for a <code>_headers</code> file or any <code>&lt;meta http-equiv="Content-Security-Policy"&gt;</code> tag in the HTML that might be restricting this, or try hosting the file on a different static host (e.g. Cloudflare Pages) to compare.</p>' +
      '</div>' :
      (testUrl ?
        '<div class="diag-box">' +
          '<p class="group-label">To help diagnose this</p>' +
          '<p class="dim-sm">Open this link directly in a browser tab:</p>' +
          '<code class="diag-url">' + esc(testUrl) + '</code>' +
          '<p class="dim-sm">It should show something like <code>test({"key":"technicians",...});</code> — if it shows something else (a sign-in page, a raw <code>{...}</code> with no <code>test(...)</code> wrapper, or doesn\u2019t load at all), that tells us where the problem is.</p>' +

  var locButtons = S.locations.map(function(l){
    var isSel = selected && selected.type === "location" && selected.id === l.id;
    return '<button class="entity-chip ' + (isSel ? "entity-chip-sel" : "") + '" onclick="' + onSelectFnName + '(\'location\',\'' + l.id + '\')">' +
      icon(l.kind, 16) + '<span>' + esc(l.name) + '</span>' + (extra && extra.recorded && extra.recorded.type === "location" && extra.recorded.id === l.id ? '<span class="recorded-tag">recorded</span>' : '') +
      '</button>';
  }).join("");
  return '<p class="group-label">Technicians</p><div class="entity-grid">' + techButtons + '</div>' +
         '<p class="group-label">Locations</p><div class="entity-grid">' + locButtons + '</div>';
}

function foundAtHTML(){
  var t = S.selectedTool;
  return '<div class="screen">' +
    '<button class="back-btn" onclick="App.backFromFoundAt()">' + icon("arrow-left", 18) + ' Back</button>' +
    toolTag(t) +
    '<div class="recorded-box">' +
      '<span class="dim-sm">Recorded location</span>' +
      '<span class="recorded-value">' + icon(refKind(t.holder), 15) + ' ' + esc(refLabel(t.holder)) + '</span>' +
    '</div>' +
    '<h3 class="prompt-q">Where did you physically find this tool?</h3>' +
    entityGrid(S.foundAt, "App.chooseFoundAt", { recorded: t.holder }) +
    '<button class="cta-btn" ' + (S.foundAt ? "" : "disabled") + ' onclick="App.confirmFoundAt()">Confirm &amp; Continue ' + icon("arrow-left", 18, "flip") + '</button>' +
    '</div>';
}

/* ---- Destination + notes ---- */
function destinationHTML(){
  var t = S.selectedTool;
  var mismatchBanner = S.mismatch ?
    '<div class="mismatch-banner">' + icon("alert", 18) +
    '<span>Recorded location doesn\u2019t match where it was found. This correction will be logged.</span></div>' : "";

  return '<div class="screen">' +
    '<button class="back-btn" onclick="App.backFromDestination()">' + icon("arrow-left", 18) + ' Back</button>' +
    toolTag(t) +
    mismatchBanner +
    '<h3 class="prompt-q">Move this tool to\u2026</h3>' +
    entityGrid(S.destination, "App.chooseDestination", null) +
    '<p class="group-label">Notes (optional)</p>' +
    '<textarea class="notes-area" placeholder="Job site, customer, condition, missing accessories\u2026" oninput="App.notesInput(this.value)">' + esc(S.notes) + '</textarea>' +
    '<button class="cta-btn" ' + (S.destination && !S.saving ? "" : "disabled") + ' onclick="App.confirmTransfer()">' +
      (S.saving ? "Saving\u2026" : (icon("check", 20) + " Confirm Transfer")) +
    '</button>' +
    '</div>';
}

function toolTag(t){
  return '<div class="tool-tag">' +
    '<div class="tag-hole"></div>' +
    '<div class="tag-id">' + esc(t.id) + '</div>' +
    '<div class="tag-name">' + esc(t.name) + '</div>' +
    '<div class="tag-cat">' + esc(t.category) + '</div>' +
    '<div class="tag-meta">' +
      '<span class="badge badge-' + statusClass(t.status) + '">' + esc(t.status) + '</span>' +
      '<span class="dim-sm">Updated ' + fmtDT(t.lastUpdate) + ' by ' + esc(t.lastUpdatedBy) + '</span>' +
    '</div>' +
  '</div>';
}

/* ---- Success ---- */
function successHTML(){
  var t = S.selectedTool;
  return '<div class="screen center-fill">' +
    '<div class="success-badge">' + icon("check", 34) + '</div>' +
    '<h2>Transfer Logged</h2>' +
    '<p class="dim">' + esc(t.name) + ' moved to <strong>' + esc(refLabel(S.destination)) + '</strong></p>' +
    (S.mismatch ? '<p class="mismatch-note">' + icon("alert", 14) + ' Location mismatch recorded in the activity log</p>' : '') +
    '<button class="cta-btn" onclick="App.moveAnother()">' + icon("tool", 18) + ' Move Another Tool</button>' +
    '<button class="secondary-btn full" onclick="App.goHome()">Back to Home</button>' +
    '</div>';
}

/* ---- My inventory ---- */
function myInventoryHTML(){
  var mine = toolsHeldBy(S.currentTech.id);
  var rows = mine.length ? mine.map(function(t){
    return '<button class="tool-row" onclick="App.pickTool(\'' + t.id + '\', true)">' +
      '<div class="tool-row-main">' +
        '<span class="tool-row-name">' + esc(t.name) + '</span>' +
        '<span class="tool-row-id">' + esc(t.id) + '</span>' +
      '</div>' +
      '<div class="tool-row-sub">' +
        '<span class="badge badge-' + statusClass(t.status) + '">' + esc(t.status) + '</span>' +
        '<span class="dim-sm">Since ' + fmtDT(t.lastUpdate) + '</span>' +
      '</div>' +
    '</button>';
  }).join("") : '<p class="empty-note">Nothing currently checked out to you.</p>';

  return '<div class="screen">' +
    '<button class="back-btn" onclick="App.goHome()">' + icon("arrow-left", 18) + ' Back</button>' +
    '<h2 class="screen-title">My Inventory</h2>' +
    '<p class="dim">' + mine.length + ' tool' + (mine.length === 1 ? "" : "s") + ' currently with you \u2014 tap one to move it</p>' +
    '<div class="tool-list">' + rows + '</div>' +
    '</div>';
}

/* ---- Activity feed ---- */
function activityRow(e){
  return '<div class="activity-card">' +
    '<div class="activity-top">' +
      '<span class="activity-tool">' + esc(e.toolName) + '</span>' +
      (e.mismatch ? '<span class="mismatch-pill">' + icon("alert", 12) + ' mismatch</span>' : '') +
    '</div>' +
    '<p class="activity-line">' + esc(e.previousHolderLabel) + ' \u2192 <strong>' + esc(e.newHolderLabel) + '</strong></p>' +
    '<p class="dim-sm">Found at ' + esc(e.foundAtLabel) + ' \u00B7 by ' + esc(e.performedBy) + ' \u00B7 ' + fmtDT(e.timestamp) + '</p>' +
    (e.notes ? '<p class="activity-notes">\u201C' + esc(e.notes) + '\u201D</p>' : '') +
    '</div>';
}

function activityHTML(){
  var rows = S.log.length ? S.log.slice(0, 50).map(activityRow).join("") : '<p class="empty-note">No activity recorded yet.</p>';
  return '<div class="screen">' +
    '<button class="back-btn" onclick="App.goHome()">' + icon("arrow-left", 18) + ' Back</button>' +
    '<h2 class="screen-title">Recent Activity</h2>' +
    '<div class="activity-list">' + rows + '</div>' +
    '</div>';
}

/* ---- Admin ---- */
function adminHTML(){
  var tabs = [
    ["technicians", "Technicians"],
    ["tools", "Tools"],
    ["locations", "Locations"],
    ["log", "Activity Log"]
  ];
  var tabHtml = tabs.map(function(tb){
    return '<button class="admin-tab ' + (S.adminTab === tb[0] ? "admin-tab-active" : "") + '" onclick="App.adminSetTab(\'' + tb[0] + '\')">' + tb[1] + '</button>';
  }).join("");

  var content;
  if (S.adminTab === "technicians") content = adminTechniciansHTML();
  else if (S.adminTab === "tools") content = adminToolsHTML();
  else if (S.adminTab === "locations") content = adminLocationsHTML();
  else content = adminLogHTML();

  return '<div class="screen">' +
    '<div class="topbar">' +
      '<div><p class="topbar-eyebrow">' + icon("shield", 14) + ' Admin</p><h2>Database</h2></div>' +
      '<div class="topbar-actions">' +
        '<button class="icon-btn" onclick="App.exportWord()" title="Export to Word">' + icon("download", 18) + '</button>' +
        '<button class="icon-btn" onclick="App.adminLogout()" title="Exit admin">' + icon("x", 20) + '</button>' +
      '</div>' +
    '</div>' +
    '<button class="export-banner" onclick="App.exportWord()">' + icon("download", 16) + ' Export full database to Word (.doc)</button>' +
    '<div class="admin-tabs">' + tabHtml + '</div>' +
    '<div class="admin-content">' + content + '</div>' +
    '<button class="danger-link" onclick="App.adminLoadRoster()">' + icon("sliders", 13) + ' Reload standard company roster\u2026</button>' +
    '</div>';
}

function adminTechniciansHTML(){
  var rows = S.technicians.map(function(t){
    if (S.adminEditingPin === t.id) return adminPinEditRow(t);
    return '<div class="admin-row">' +
      '<div class="admin-row-main">' +
        '<span class="' + (t.active ? "" : "strike") + '">' + esc(t.name) + '</span>' +
        '<span class="dim-sm">' + toolsHeldBy(t.id).length + ' tool(s) checked out</span>' +
      '</div>' +
      '<div class="admin-row-actions">' +
        '<button class="mini-btn" onclick="App.adminEditPinStart(\'' + t.id + '\')">' + icon("pencil", 14) + ' PIN</button>' +
        '<button class="mini-btn ' + (t.active ? "mini-btn-danger" : "") + '" onclick="App.adminToggleTechActive(\'' + t.id + '\')">' + (t.active ? "Deactivate" : "Reactivate") + '</button>' +
        '<button class="mini-btn mini-btn-danger" onclick="App.adminRemoveTechnician(\'' + t.id + '\')">' + icon("trash", 14) + ' Remove</button>' +
      '</div>' +
    '</div>';
  }).join("");

  return rows +
    '<div class="admin-add-form">' +
      '<input type="text" id="new-tech-name" placeholder="New technician name" />' +
      '<button class="mini-btn mini-btn-primary" onclick="App.adminAddTechnician(document.getElementById(\'new-tech-name\').value); document.getElementById(\'new-tech-name\').value=\'\'">' + icon("plus", 14) + ' Add</button>' +
    '</div>';
}

function adminToolsHTML(){
  var rows = S.tools.map(function(t){
    if (S.adminEditingTool === t.id) return adminToolEditRow(t);
    return '<div class="admin-row">' +
      '<div class="admin-row-main">' +
        '<span class="' + (t.active === false ? "strike" : "") + '">' + esc(t.name) + ' <span class="dim-sm">' + esc(t.id) + '</span></span>' +
        '<span class="dim-sm">' + esc(refLabel(t.holder)) + ' \u00B7 ' + esc(t.status) + '</span>' +
      '</div>' +
      '<div class="admin-row-actions">' +
        '<button class="mini-btn" onclick="App.adminEditToolStart(\'' + t.id + '\')">' + icon("pencil", 14) + ' Correct</button>' +
        '<button class="mini-btn ' + (t.active === false ? "" : "mini-btn-danger") + '" onclick="App.adminRetireTool(\'' + t.id + '\')">' + (t.active === false ? "Restore" : "Retire") + '</button>' +
      '</div>' +
    '</div>';
  }).join("");

  return rows +
    '<div class="admin-add-form">' +
      '<input type="text" id="new-tool-name" placeholder="New tool name" />' +
      '<input type="text" id="new-tool-cat" placeholder="Category" />' +
      '<button class="mini-btn mini-btn-primary" onclick="App.adminAddTool(document.getElementById(\'new-tool-name\').value, document.getElementById(\'new-tool-cat\').value); document.getElementById(\'new-tool-name\').value=\'\'; document.getElementById(\'new-tool-cat\').value=\'\'">' + icon("plus", 14) + ' Add Tool</button>' +
    '</div>';
}

function adminPinEditRow(t){
  return '<div class="admin-edit-card">' +
    '<p class="group-label">New 4-digit PIN for ' + esc(t.name) + '</p>' +
    '<input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="pin-input-' + t.id + '" placeholder="0000" class="pin-text-input" autofocus />' +
    (S.adminPinError ? '<p class="pin-error">' + icon("alert", 14) + ' Enter exactly 4 digits</p>' : '') +
    '<div class="admin-row-actions">' +
      '<button class="mini-btn mini-btn-primary" onclick="App.adminEditPinSave(\'' + t.id + '\', document.getElementById(\'pin-input-' + t.id + '\').value)">Save</button>' +
      '<button class="mini-btn" onclick="App.adminEditPinCancel()">Cancel</button>' +
    '</div>' +
  '</div>';
}

function adminToolEditRow(t){
  var techOpts = activeTechnicians().map(function(tc){
    return '<option value="technician:' + tc.id + '" ' + (t.holder.type === "technician" && t.holder.id === tc.id ? "selected" : "") + '>' + esc(tc.name) + '</option>';
  }).join("");
  var locOpts = S.locations.map(function(l){
    return '<option value="location:' + l.id + '" ' + (t.holder.type === "location" && t.holder.id === l.id ? "selected" : "") + '>' + esc(l.name) + '</option>';
  }).join("");

  return '<div class="admin-edit-card">' +
    '<p class="group-label">Correct record for ' + esc(t.name) + '</p>' +
    '<select id="edit-holder-' + t.id + '">' + techOpts + locOpts + '</select>' +
    '<input type="text" id="edit-status-' + t.id + '" placeholder="Status" value="' + esc(t.status) + '" />' +
    '<textarea id="edit-notes-' + t.id + '" placeholder="Correction notes">' + esc(t.notes || "") + '</textarea>' +
    '<div class="admin-row-actions">' +
      '<button class="mini-btn mini-btn-primary" onclick="(function(){var sel=document.getElementById(\'edit-holder-' + t.id + '\').value.split(\':\'); App.adminEditToolSave(\'' + t.id + '\', sel[0], sel[1], document.getElementById(\'edit-status-' + t.id + '\').value, document.getElementById(\'edit-notes-' + t.id + '\').value);})()">Save</button>' +
      '<button class="mini-btn" onclick="App.adminEditToolCancel()">Cancel</button>' +
    '</div>' +
  '</div>';
}

function adminLocationsHTML(){
  var rows = S.locations.map(function(l){
    return '<div class="admin-row"><div class="admin-row-main"><span>' + icon(l.kind, 15) + ' ' + esc(l.name) + '</span></div></div>';
  }).join("");
  return rows +
    '<div class="admin-add-form">' +
      '<input type="text" id="new-loc-name" placeholder="New location or truck name" />' +
      '<select id="new-loc-kind">' +
        '<option value="warehouse">Shop</option>' +
        '<option value="truck">Truck</option>' +
        '<option value="mappin">Job Site</option>' +
        '<option value="tool">Repair / Calibration</option>' +
      '</select>' +
      '<button class="mini-btn mini-btn-primary" onclick="App.adminAddLocation(document.getElementById(\'new-loc-name\').value, document.getElementById(\'new-loc-kind\').value); document.getElementById(\'new-loc-name\').value=\'\'">' + icon("plus", 14) + ' Add</button>' +
    '</div>';
}

function adminLogHTML(){
  var mismatches = S.log.filter(function(e){ return e.mismatch; });
  var section = '<p class="group-label">' + mismatches.length + ' location mismatch(es) on record</p>';
  var rows = S.log.length ? S.log.map(activityRow).join("") : '<p class="empty-note">No activity yet.</p>';
  return section + '<div class="activity-list">' + rows + '</div>';
}

/* ---------------- Init ---------------- */
/* ---------------- CSP violation capture ----------------
   If the page hosting this file sends a restrictive Content-Security-Policy
   that blocks loading the database script, this is the one thing that will
   catch it definitively — the browser fires this event with the exact
   blocked URL and the directive that blocked it, whether or not anyone has
   access to developer tools (which matters a lot on a phone).
   ------------------------------------------------------------------- */
var __lastCspViolation = null;
document.addEventListener("securitypolicyviolation", function(e){
  __lastCspViolation = {
    directive: e.violatedDirective,
    blockedURI: e.blockedURI,
    time: Date.now()
  };
  console.error("CSP violation", __lastCspViolation);
});

document.addEventListener("DOMContentLoaded", bootstrap);

</script>
</body>
</html>
